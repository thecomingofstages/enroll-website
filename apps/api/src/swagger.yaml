openapi: 3.0.3
info:
  title: TCOS Registration System API
  description: |
    Backend API for the TCOS theatrical event registration platform.
  version: 1.0.0
  contact:
    name: TCOS Backend Engineering Team

servers:
  - url: http://localhost:3001/v1
    description: Local development

tags:
  - name: Auth
  - name: Users
  - name: Activities
  - name: Registrations
  - name: Payments
  - name: Admin
  - name: Events

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SuccessEnvelope:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:    { type: object }

    ErrorEnvelope:
      type: object
      properties:
        success: { type: boolean, example: false }
        error:
          type: object
          properties:
            code:    { type: string, example: NOT_FOUND }
            message: { type: string }
            field:   { type: string }

    PaginationMeta:
      type: object
      properties:
        page:  { type: integer }
        limit: { type: integer }
        total: { type: integer }

    User:
      type: object
      properties:
        _id:               { type: string, format: uuid }
        first_name:        { type: string }
        last_name:         { type: string }
        nickname:          { type: string }
        email:             { type: string, format: email }
        phone:             { type: string }
        gender:            { type: string, enum: [Male, Female, "LGBTQ+", Unspecified] }
        interests:         { type: array, items: { type: string } }
        profile_image_url: { type: string, nullable: true }
        address:           { type: string, nullable: true }
        education_level:   { type: string, nullable: true }
        institution:       { type: string, nullable: true }
        created_at:        { type: string, format: date-time }

    ScheduleSlot:
      type: object
      properties:
        start_time:  { type: string, example: "09:00" }
        end_time:    { type: string, example: "12:00" }
        title:       { type: string }
        description: { type: string, nullable: true }

    ScheduleItem:
      type: object
      properties:
        date:  { type: string, format: date }
        venue: { type: string }
        slots: { type: array, items: { $ref: '#/components/schemas/ScheduleSlot' } }

    ExtraQuestion:
      type: object
      properties:
        question_id:   { type: string }
        question_text: { type: string }
        type:          { type: string, enum: [text, single_choice] }
        options:       { type: array, items: { type: string }, nullable: true }
        is_required:   { type: boolean }

    Speaker:
      type: object
      properties:
        _id:         { type: string, format: uuid }
        activity_id: { type: string, format: uuid }
        name:        { type: string }
        position:    { type: string }
        image_url:   { type: string, nullable: true }

    Activity:
      type: object
      properties:
        _id:                  { type: string, format: uuid }
        name:                 { type: string }
        description:          { type: string }
        hero_image_url:       { type: string }
        price:                { type: number }
        seat_capacity:        { type: integer }
        enrolled_count:       { type: integer }
        tags:                 { type: array, items: { type: string } }
        benefits:             { type: array, items: { type: string } }
        is_registration_open: { type: boolean }
        is_featured:          { type: boolean }
        schedule:             { type: array, items: { $ref: '#/components/schemas/ScheduleItem' } }
        extra_questions:      { type: array, items: { $ref: '#/components/schemas/ExtraQuestion' } }
        speakers:             { type: array, items: { $ref: '#/components/schemas/Speaker' } }

    CustomAnswer:
      type: object
      properties:
        question_id: { type: string }
        answer:      { type: string }

    Registration:
      type: object
      properties:
        _id:            { type: string, format: uuid }
        user_id:        { type: string, format: uuid }
        activity_id:    { type: string, format: uuid }
        status:         { type: string, enum: [PENDING, PAID, JOINED, CANCELLED] }
        group_name:     { type: string, nullable: true }
        registered_at:  { type: string, format: date-time }
        custom_answers: { type: array, items: { $ref: '#/components/schemas/CustomAnswer' } }

    Payment:
      type: object
      properties:
        _id:             { type: string, format: uuid }
        registration_id: { type: string, format: uuid }
        user_id:         { type: string, format: uuid }
        amount:          { type: number }
        status:          { type: string, enum: [WAITING, VERIFIED, FAILED] }
        verified_at:     { type: string, format: date-time, nullable: true }

paths:
  # ── AUTH ────────────────────────────────────────────────────────
  /auth/register:
    post:
      tags: [Auth]
      summary: Create TCOS account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [first_name, last_name, nickname, email, phone, password, gender]
              properties:
                first_name: { type: string }
                last_name:  { type: string }
                nickname:   { type: string }
                email:      { type: string, format: email }
                phone:      { type: string }
                password:   { type: string, minLength: 8 }
                gender:     { type: string, enum: [Male, Female, "LGBTQ+", Unspecified] }
                interests:  { type: array, items: { type: string } }
      responses:
        '201': { description: Account created, content: { application/json: { schema: { $ref: '#/components/schemas/SuccessEnvelope' } } } }
        '409': { description: Email already registered }

  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate and get JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:    { type: string }
                password: { type: string }
      responses:
        '200': { description: Authenticated }
        '401': { description: Invalid credentials }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Terminate session
      security: [{ BearerAuth: [] }]
      responses:
        '204': { description: Logged out }

  /auth/otp/send:
    post:
      tags: [Auth]
      summary: Send OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone: { type: string }
                email: { type: string }
      responses:
        '200': { description: OTP sent }

  /auth/otp/verify:
    post:
      tags: [Auth]
      summary: Verify OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                phone: { type: string }
                email: { type: string }
                code:  { type: string }
      responses:
        '200': { description: OTP verified, returns otp_token }
        '422': { description: Invalid or expired OTP }

  # ── USERS ───────────────────────────────────────────────────────
  /users/me:
    get:
      tags: [Users]
      summary: Get current user profile
      security: [{ BearerAuth: [] }]
      responses:
        '200': { description: User profile, content: { application/json: { schema: { $ref: '#/components/schemas/User' } } } }
    patch:
      tags: [Users]
      summary: Update profile
      security: [{ BearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                nickname:          { type: string }
                interests:         { type: array, items: { type: string } }
                profile_image_url: { type: string }
                address:           { type: string }
                education_level:   { type: string }
                institution:       { type: string }
      responses:
        '200': { description: Updated profile }

  /users/me/activities:
    get:
      tags: [Users]
      summary: Get my registered activities
      security: [{ BearerAuth: [] }]
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [upcoming, past] }
        - in: query
          name: reg_status
          schema: { type: string, enum: [PENDING, PAID, JOINED] }
      responses:
        '200': { description: List of registrations with activity detail }

  /users/me/qr:
    get:
      tags: [Users]
      summary: Generate participant QR token (5-min TTL)
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Signed QR token
          content:
            application/json:
              schema:
                type: object
                properties:
                  qr_token:   { type: string }
                  expires_at: { type: string, format: date-time }
                  expires_in: { type: integer, example: 300 }

  # ── ACTIVITIES ──────────────────────────────────────────────────
  /activities:
    get:
      tags: [Activities]
      summary: List activities
      parameters:
        - in: query
          name: tags
          schema: { type: string }
          description: Comma-separated tags (OR match)
        - in: query
          name: is_featured
          schema: { type: boolean }
        - in: query
          name: is_registration_open
          schema: { type: boolean }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        '200': { description: Paginated activity list }

  /activities/recommended:
    get:
      tags: [Activities]
      summary: Personalized recommendations (matches user interests)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 10 }
      responses:
        '200': { description: Recommended activities }

  /activities/{id}:
    get:
      tags: [Activities]
      summary: Full activity detail
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Activity detail including schedule, speakers, extra_questions }
        '404': { description: Not found }

  # ── REGISTRATIONS ───────────────────────────────────────────────
  /registrations:
    post:
      tags: [Registrations]
      summary: Initiate registration (existing or new user)
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [activity_id]
              properties:
                activity_id:    { type: string }
                custom_answers: { type: array, items: { $ref: '#/components/schemas/CustomAnswer' } }
                new_user:
                  description: Provide this block instead of Bearer token for new-user flow
                  type: object
                  properties:
                    first_name: { type: string }
                    last_name:  { type: string }
                    nickname:   { type: string }
                    email:      { type: string }
                    phone:      { type: string }
                    password:   { type: string }
                    gender:     { type: string }
      responses:
        '201': { description: Registration created (PENDING) }
        '409': { description: Already registered }
        '422': { description: Registration closed or activity full }

  /registrations/{id}:
    get:
      tags: [Registrations]
      summary: Get registration detail
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Registration detail }
        '403': { description: Not the owner }
        '404': { description: Not found }

  /registrations/{id}/payment:
    post:
      tags: [Payments]
      summary: Submit PromptPay slip for verification
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                slip:
                  type: string
                  format: binary
                  description: JPEG/PNG slip image (max 10 MB) — processed in-memory, never stored
      responses:
        '200': { description: Payment verified, registration set to PAID }
        '409': { description: Duplicate QR data }
        '422': { description: Amount mismatch or unreadable QR }

  

  # ── ADMIN ───────────────────────────────────────────────────────
  /admin/activities:
    post:
      tags: [Admin]
      summary: Create activity
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Activity' }
      responses:
        '201': { description: Activity created }

  /admin/activities/{id}:
    patch:
      tags: [Admin]
      summary: Update activity
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                is_registration_open: { type: boolean }
                seat_capacity:        { type: integer }
                is_featured:          { type: boolean }
      responses:
        '200': { description: Updated }
    delete:
      tags: [Admin]
      summary: Delete activity
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '204': { description: Deleted }
        '409': { description: Cannot delete — active registrations exist }

  /admin/activities/{id}/export:
    post:
      tags: [Admin]
      summary: Export registrations to Google Sheets
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Export complete, returns sheet URL }

  /admin/registrations:
    get:
      tags: [Admin]
      summary: List all registrations
      security: [{ BearerAuth: [] }]
      parameters:
        - in: query
          name: activity_id
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string, enum: [PENDING, PAID, JOINED, CANCELLED] }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
      responses:
        '200': { description: Paginated registration list }

  /admin/registrations/{id}/status:
    patch:
      tags: [Admin]
      summary: Manually override registration status
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:     { type: string, enum: [PENDING, PAID, JOINED, CANCELLED] }
                group_name: { type: string }
      responses:
        '200': { description: Status updated }

  # ── EVENTS ──────────────────────────────────────────────────────
  /events/scan:
    post:
      tags: [Events]
      summary: Scan participant QR at entry
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [qr_token, event_id]
              properties:
                qr_token:   { type: string, description: Signed QR token from GET /users/me/qr }
                event_id:   { type: string, description: Activity UUIDv7 being checked into }
                group_name: { type: string, nullable: true }
      responses:
        '200': { description: Entry granted, registration set to JOINED }
        '404': { description: User not enrolled in this event }
        '422': { description: QR expired, invalid, or already scanned }
