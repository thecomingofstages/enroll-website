openapi: 3.0.3
info:
  title: TCOS Registration System API
  description: |
    Backend API for the TCOS (The Coming of Stages) event registration platform.
    Base URL: `/v1`
  version: 1.0.0
  contact:
    name: TCOS Backend Engineering Team

servers:
  - url: http://localhost:3001/v1
    description: Local development

tags:
  - name: Auth
    description: Registration, login, logout, OTP
  - name: Users
    description: User profile and QR token
  - name: Activities
    description: Public activity listing and detail
  - name: Registrations
    description: Registration creation and lookup
  - name: Payments
    description: Slip submission
  - name: Events
    description: QR check-in at venue
  - name: Admin — Activities
    description: Admin CRUD for activities and export
  - name: Admin — Registrations
    description: Admin registration management
  - name: Admin — Payments
    description: Finance payment verification
  - name: Stamp Store
    description: Art Market stamp collection — user-facing stamp and store listing
  - name: Admin — Stamp Store
    description: Admin management of stamp stores and prize redemption

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ── Envelopes ──────────────────────────────────────────────────────────────
    SuccessEnvelope:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:    { type: object }

    ErrorEnvelope:
      type: object
      properties:
        success: { type: boolean, example: false }
        error:
          type: object
          properties:
            code:    { type: string }
            message: { type: string }
            field:   { type: string, description: "Set on validation errors to indicate which field failed" }

    PaginationMeta:
      type: object
      properties:
        page:  { type: integer }
        limit: { type: integer }
        total: { type: integer }

    # ── User ──────────────────────────────────────────────────────────────────
    User:
      type: object
      properties:
        _id:               { type: string, format: uuid }
        first_name:        { type: string }
        last_name:         { type: string }
        nickname:          { type: string }
        email:             { type: string, format: email }
        phone:             { type: string }
        gender:            { type: string, enum: [Male, Female, "LGBTQ+", Unspecified] }
        interests:         { type: array, items: { type: string } }
        profile_image_url: { type: string, nullable: true, description: "S3/R2 CDN link (profile only)" }
        address:           { type: string, nullable: true }
        education_level:   { type: string, nullable: true }
        institution:       { type: string, nullable: true }
        created_at:        { type: string, format: date-time }

    # ── Activity ──────────────────────────────────────────────────────────────
    Speaker:
      type: object
      required: [name, position]
      properties:
        _id:      { type: string, format: uuid, description: "Auto-generated if omitted" }
        name:     { type: string }
        position: { type: string }
        image_url: { type: string, nullable: true, description: "Google Drive share link or any public image URL" }

    ScheduleSlot:
      type: object
      properties:
        start_time:  { type: string, example: "09:00" }
        end_time:    { type: string, example: "12:00" }
        title:       { type: string }
        description: { type: string, nullable: true }

    ScheduleItem:
      type: object
      properties:
        date:        { type: string, format: date }
        venue:       { type: string, description: "Short venue label" }
        location_link_gg_map:     { type: string, nullable: true }
        location_pics:            { type: array, items: { type: string }, nullable: true }
        additional_location_info: { type: array, items: { type: string }, nullable: true }
        slots:       { type: array, items: { $ref: '#/components/schemas/ScheduleSlot' } }
        

    ExtraQuestion:
      type: object
      properties:
        question_id:   { type: string }
        question_text: { type: string }
        type:          { type: string, enum: [text, single_choice] }
        options:       { type: array, items: { type: string }, nullable: true }
        is_required:   { type: boolean }

    Activity:
      type: object
      properties:
        _id:                        { type: string, format: uuid }
        name:                       { type: string }
        description:                { type: string }
        hero_image_url:             { type: string, description: "Google Drive share link or public image URL" }
        price:                      { type: number, minimum: 0 }
        seat_capacity:              { type: integer }
        enrolled_count:             { type: integer, description: "Real-time count via $inc — never count on read" }
        tags:                       { type: array, items: { type: string } }
        benefits:                   { type: array, items: { type: string } }
        open_registration_at:       { type: string, format: date-time, nullable: true, description: "Registration auto-opens at this datetime. null = open from creation." }
        close_registration_at:      { type: string, format: date-time, nullable: true, description: "Registration auto-closes at this datetime. null = no auto-close." }
        registration_open_override: { type: boolean, nullable: true, description: "null = use date window. true = force open. false = force closed." }
        is_registration_open:       { type: boolean, description: "Computed virtual — priority: override → date window → false" }
        is_featured:                { type: boolean }
        speakers:                   { type: array, items: { $ref: '#/components/schemas/Speaker' }}
        schedule:                   { type: array, items: { $ref: '#/components/schemas/ScheduleItem' } }
        extra_questions:            { type: array, items: { $ref: '#/components/schemas/ExtraQuestion' } }
        created_at:                 { type: string, format: date-time }
        updated_at:                 { type: string, format: date-time }

    ActivityInput:
      type: object
      required: [name, description, hero_image_url, price, seat_capacity]
      properties:
        name:                       { type: string }
        description:                { type: string }
        hero_image_url:             { type: string, description: "Google Drive share link or any public image URL" }
        price:                      { type: number, minimum: 0 }
        seat_capacity:              { type: integer }
        tags:                       { type: array, items: { type: string } }
        benefits:                   { type: array, items: { type: string } }
        open_registration_at:       { type: string, format: date-time, nullable: true }
        close_registration_at:      { type: string, format: date-time, nullable: true }
        registration_open_override: { type: boolean, nullable: true }
        is_featured:                { type: boolean }
        schedule:                   { type: array, items: { $ref: '#/components/schemas/ScheduleItem' } }
        extra_questions:
          type: array
          items:
            type: object
            properties:
              question_id:   { type: string, description: "Optional — auto-generated if omitted" }
              question_text: { type: string }
              type:          { type: string, enum: [text, single_choice] }
              options:       { type: array, items: { type: string }, nullable: true }
              is_required:   { type: boolean }

    # ── Registration ──────────────────────────────────────────────────────────
    CustomAnswer:
      type: object
      properties:
        question_id: { type: string }
        answer:      { type: string }

    Registration:
      type: object
      properties:
        _id:            { type: string, format: uuid }
        user_id:        { type: string, format: uuid }
        activity_id:    { type: string, format: uuid }
        status:         { type: string, enum: [PENDING, PAID, JOINED, CANCELLED] }
        group_name:     { type: string, nullable: true }
        registered_at:  { type: string, format: date-time }
        custom_answers: { type: array, items: { $ref: '#/components/schemas/CustomAnswer' } }

    # ── Stamp Store ───────────────────────────────────────────────────────────
    Store:
      type: object
      properties:
        _id:        { type: string, format: uuid, description: "UUIDv7" }
        name:       { type: string, description: "Display name shown on stamp page" }
        created_at: { type: string, format: date-time }

    Stamp:
      type: object
      description: "Embedded inside StampUser.stamp_collected"
      properties:
        _id:         { type: string, format: uuid, description: "UUIDv7" }
        store_id:    { type: string, format: uuid, description: "Ref: Store" }
        store_name:  { type: string, description: "Denormalized for scan response convenience" }
        achieved_at: { type: string, format: date-time }

    StampUser:
      type: object
      properties:
        _id:             { type: string, format: uuid, description: "= User._id" }
        stamp_collected: { type: array, items: { $ref: '#/components/schemas/Stamp' } }
        is_exchanged:    { type: boolean }

    StoreStampStatus:
      type: object
      description: "Per-store stamp status returned from GET /stampstore"
      properties:
        name:  { type: string }
        count: { type: integer, enum: [0, 1], description: "0 = not stamped, 1 = stamped" }

    # ── Payment ───────────────────────────────────────────────────────────────
    Payment:
      type: object
      properties:
        _id:               { type: string, format: uuid }
        registration_id:   { type: string, format: uuid }
        user_id:           { type: string, format: uuid }
        amount:            { type: number, nullable: true, description: "Best-effort EMV tag 54 extraction. null if QR had no amount." }
        promptpay_qr_data: { type: string, description: "Raw QR string decoded from slip — any bank app format" }
        slip_submitted_at: { type: string, format: date-time }
        status:            { type: string, enum: [WAITING, VERIFIED, FAILED] }
        verified_at:       { type: string, format: date-time, nullable: true }
        note:              { type: string, nullable: true, description: "Finance team note on verify/reject" }
        created_at:        { type: string, format: date-time }

paths:
  # ═══════════════════════════════════════════════════════════════════════════
  # AUTH
  # ═══════════════════════════════════════════════════════════════════════════
  /auth/register:
    post:
      tags: [Auth]
      summary: Create TCOS account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [first_name, last_name, nickname, email, phone, password, gender]
              properties:
                first_name: { type: string }
                last_name:  { type: string }
                nickname:   { type: string }
                email:      { type: string, format: email }
                phone:      { type: string }
                password:   { type: string, minLength: 8 }
                gender:     { type: string, enum: [Male, Female, "LGBTQ+", Unspecified] }
                interests:  { type: array, items: { type: string } }
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/User' }
        '409': { description: "DUPLICATE_EMAIL — email already registered" }

  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate user, receive JWT
      description: |
        Returns access token in body. Sets refresh token as HttpOnly cookie.
        **Never distinguishes between wrong email vs wrong password** (anti-enumeration).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:    { type: string }
                password: { type: string }
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:     { type: boolean }
                  data:
                    type: object
                    properties:
                      access_token: { type: string }
                      token_type:   { type: string, example: Bearer }
                      expires_in:   { type: integer, example: 900 }
                      user:         { $ref: '#/components/schemas/User' }
        '401': { description: "INVALID_CREDENTIALS" }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Terminate session, clear refresh cookie
      security: [{ BearerAuth: [] }]
      responses:
        '204': { description: Logged out }
        '401': { description: TOKEN_MISSING or TOKEN_EXPIRED }

  /auth/otp/send:
    post:
      tags: [Auth]
      summary: Send OTP to phone or email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone: { type: string }
                email: { type: string }
      responses:
        '200':
          description: OTP sent (response identical regardless of whether identifier exists)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:    { type: boolean }
                  data:
                    type: object
                    properties:
                      expires_in: { type: integer, example: 300 }

  /auth/otp/verify:
    post:
      tags: [Auth]
      summary: Verify OTP, receive short-lived OTP token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                phone: { type: string }
                email: { type: string }
                code:  { type: string, example: "483920" }
      responses:
        '200':
          description: Verified — returns otp_token for use as X-OTP-Token header
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      otp_token:  { type: string }
                      expires_in: { type: integer, example: 600 }
        '422': { description: "Invalid or expired OTP" }

  # ═══════════════════════════════════════════════════════════════════════════
  # USERS
  # ═══════════════════════════════════════════════════════════════════════════
  /users/me:
    get:
      tags: [Users]
      summary: Get current user profile
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/User' }
    patch:
      tags: [Users]
      summary: Update profile
      security: [{ BearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                nickname:          { type: string }
                interests:         { type: array, items: { type: string } }
                profile_image_url: { type: string, description: "S3/R2 URL — profile is the only R2-stored image" }
                address:           { type: string }
                education_level:   { type: string }
                institution:       { type: string }
      responses:
        '200': { description: Updated profile }

  /users/me/activities:
    get:
      tags: [Users]
      summary: My registered activities (My Tickets)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [upcoming, past] }
          description: Filter by schedule date relative to now
        - in: query
          name: reg_status
          schema: { type: string, enum: [PENDING, PAID, JOINED] }
      responses:
        '200': { description: List of registrations with embedded activity snapshot }

  /users/me/qr:
    get:
      tags: [Users]
      summary: Generate participant check-in QR (5-minute TTL)
      description: |
        Returns a HMAC-signed compact token encoding `{ user_id, iat, exp }`.
        The QR is **identity-only** — one QR covers all the user's PAID activities.
        The scanner provides `event_id` at scan time to identify which event.
        Frontend must display a countdown and auto-refresh when `expires_in` reaches 0.
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Signed QR token
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      qr_token:   { type: string, description: "base64url(payload).HMAC — render as QR code client-side" }
                      expires_at: { type: string, format: date-time }
                      expires_in: { type: integer, example: 300 }

  # ═══════════════════════════════════════════════════════════════════════════
  # ACTIVITIES (public)
  # ═══════════════════════════════════════════════════════════════════════════
  /activities:
    get:
      tags: [Activities]
      summary: List activities
      parameters:
        - in: query
          name: tags
          schema: { type: string }
          description: Comma-separated tags — OR match (e.g. `drama,improv`)
        - in: query
          name: is_featured
          schema: { type: boolean }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Paginated activity list (excludes extra_questions for payload size)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  meta:    { $ref: '#/components/schemas/PaginationMeta' }
                  data:    { type: array, items: { $ref: '#/components/schemas/Activity' } }

  /activities/recommended:
    get:
      tags: [Activities]
      summary: Personalized activity recommendations
      description: |
        Matches activities by tag overlap with the authenticated user's `interests` array.
        Falls back to featured activities if user has no interests set.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 10 }
      responses:
        '200':
          description: Recommended activities ordered by interest-tag overlap score
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:    { type: array, items: { $ref: '#/components/schemas/Activity' } }

  /activities/{id}:
    get:
      tags: [Activities]
      summary: Full activity detail
      description: Returns full document including schedule, extra_questions, and enrolled_count.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Full activity document
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Activity' }
        '404': { description: "NOT_FOUND" }

  # ═══════════════════════════════════════════════════════════════════════════
  # REGISTRATIONS
  # ═══════════════════════════════════════════════════════════════════════════
  /registrations:
    post:
      tags: [Registrations]
      summary: Initiate registration
      description: |
        **Case A — Existing user:** Send Bearer token. No `new_user` block needed.

        **Case B — New user:** Omit Bearer token. Include `new_user` object.
        Account is created atomically and an `access_token` is returned alongside the registration.

        **Free activities** (`price === 0`): status is set to `PAID` immediately and `enrolled_count` is incremented.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [activity_id]
              properties:
                activity_id:
                  type: string
                custom_answers:
                  type: array
                  items: { $ref: '#/components/schemas/CustomAnswer' }
                new_user:
                  description: "Case B only — omit when sending Bearer token"
                  type: object
                  required: [first_name, last_name, nickname, email, phone, password, gender]
                  properties:
                    first_name: { type: string }
                    last_name:  { type: string }
                    nickname:   { type: string }
                    email:      { type: string }
                    phone:      { type: string }
                    password:   { type: string, minLength: 8 }
                    gender:     { type: string, enum: [Male, Female, "LGBTQ+", Unspecified] }
      responses:
        '201':
          description: Registration created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      registration_id: { type: string }
                      status:          { type: string, enum: [PENDING, PAID] }
                      activity_id:     { type: string }
                      registered_at:   { type: string, format: date-time }
                      activity:
                        type: object
                        properties:
                          name:  { type: string }
                          price: { type: number }
                      access_token: { type: string, description: "Case B only — new user JWT" }
        '400': { description: "VALIDATION_ERROR — missing fields or unanswered required questions" }
        '409': { description: "DUPLICATE_REGISTRATION or DUPLICATE_EMAIL" }
        '422': { description: "REGISTRATION_CLOSED or ACTIVITY_FULL" }

  /registrations/{id}:
    get:
      tags: [Registrations]
      summary: Get registration detail
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Registration with activity snapshot
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Registration' }
        '403': { description: "FORBIDDEN — not the registration owner" }
        '404': { description: "NOT_FOUND" }

  /registrations/mine:
    get:
      tags: [Registrations]
      summary: Get current user's own registrations
      description: |
        Returns all registrations belonging to the authenticated user.
        Primarily used to find an existing PENDING registration ID so the
        user can resubmit a slip via `POST /registrations/:id/payment`
        without re-registering.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [PENDING, PAID, JOINED, CANCELLED] }
          description: Filter by registration status
      responses:
        '200':
          description: List of user's registrations with embedded activity snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items:
                      allOf:
                        - $ref: '#/components/schemas/Registration'
                        - type: object
                          properties:
                            activity:
                              type: object
                              properties:
                                name:           { type: string }
                                hero_image_url: { type: string }
                                price:          { type: number }
                                schedule:       { type: array, items: { $ref: '#/components/schemas/ScheduleItem' } }
                                enrolled_count: { type: integer }
                                seat_capacity:  { type: integer }
        '401': { description: TOKEN_MISSING or TOKEN_EXPIRED }
        
  /registrations/{id}/payment:
    post:
      tags: [Payments]
      summary: Submit payment slip for QR extraction
      description: |
        Accepts a banking slip image (JPEG/PNG). Any bank app is accepted — PromptPay, SCB, KBank, BBL, etc.

        **What we do:**
        - Decode QR from anywhere in the image (3-pass: raw → greyscale+contrast → invert)
        - Extract EMV amount if present (best-effort — never blocks submission)
        - Store `slip_submitted_at` timestamp for finance reconciliation
        - Set registration → `PAID`, increment `enrolled_count`

        **What we don't do:** verify the actual money transfer — that's finance's job via export.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [slip]
              properties:
                slip:
                  type: string
                  format: binary
                  description: "JPEG or PNG slip image — processed in-memory, never stored to disk"
      responses:
        '200':
          description: Slip received — payment status WAITING, registration set to PAID
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      payment_id:        { type: string }
                      registration_id:   { type: string }
                      status:            { type: string, example: WAITING }
                      slip_submitted_at: { type: string, format: date-time }
                      detected_amount:   { type: number, nullable: true, description: "From EMV tag 54 if present" }
                      activity_price:    { type: number, description: "Expected amount for finance reference" }
                      note:              { type: string, nullable: true }
        '400': { description: "VALIDATION_ERROR — no slip file attached" }
        '403': { description: "FORBIDDEN — not the registration owner" }
        '404': { description: "NOT_FOUND" }
        '409': { description: "DUPLICATE_PAYMENT — same QR already used" }
        '422': { description: "ALREADY_PAID — registration not in PENDING state, or QR_UNREADABLE" }

  # ═══════════════════════════════════════════════════════════════════════════
  # EVENTS (check-in)
  # ═══════════════════════════════════════════════════════════════════════════
  /events/scan:
    post:
      tags: [Events]
      summary: Scan participant QR at event entry
      description: |
        Called by the scanner device. Receives the QR token from the participant's screen
        and the `event_id` of the activity being checked into.

        **Flow:** verify HMAC → check expiry → look up registration → guard status → set JOINED → push to Attendance map

        Attendance is tracked per-day using Bangkok time (UTC+7).
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [qr_token, event_id]
              properties:
                qr_token:
                  type: string
                  description: "Signed QR token from GET /users/me/qr"
                event_id:
                  type: string
                  description: "Activity UUIDv7 — identifies which event to check into"
      responses:
        '200':
          description: Entry granted — registration set to JOINED
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      registration_id: { type: string }
                      status:          { type: string, example: JOINED }
                      checked_in_at:   { type: string, format: date-time }
                      date_key:        { type: string, example: "2026-08-01", description: "Bangkok date used as Attendance map key" }
                      user:
                        type: object
                        properties:
                          full_name: { type: string }
                          nickname:  { type: string }
                          phone:     { type: string }
                      activity_name: { type: string }
                      stamps:
                        type: array
                        description: "Art Market stamps collected by this user"
                        items: { $ref: '#/components/schemas/Stamp' }
                      is_exchanged:
                        type: boolean
                        description: "Whether this user has already redeemed their prize"
        '400': { description: "VALIDATION_ERROR — missing qr_token or event_id" }
        '403': { description: "FORBIDDEN — requester is not admin" }
        '404': { description: "NOT_ENROLLED — user has no registration for this event" }
        '422': { description: "QR_EXPIRED, INVALID_QR, ALREADY_JOINED, or PAYMENT_REQUIRED" }

  # ═══════════════════════════════════════════════════════════════════════════
  # ADMIN — ACTIVITIES
  # ═══════════════════════════════════════════════════════════════════════════
  /admin/activities:
    post:
      tags: [Admin — Activities]
      summary: Create activity
      description: |
        All image fields (`hero_image_url`) are Google Drive share links or any public URL — no file upload.
        `enrolled_count` is always initialised to 0 regardless of what the client sends.
        `question_id` is auto-generated for any `extra_question` that omits it.
        Also creates a paired empty Attendance document.
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ActivityInput' }
      responses:
        '201':
          description: Activity created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Activity' }
        '400': { description: "VALIDATION_ERROR — missing hero_image_url or required fields" }
        '403': { description: "FORBIDDEN" }

  /admin/activities/{id}:
    patch:
      tags: [Admin — Activities]
      summary: Update activity
      description: |
        Partial update. Send only the fields you want to change.

        **Registration window:** use `open_registration_at`/`close_registration_at` for date-based
        control, or `registration_open_override: true/false` to hard-toggle regardless of dates.
        Set `registration_open_override: null` to revert to date-window behaviour.

        `enrolled_count`, `_id`, `created_at`, and `deleted_at` are always blocked.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:                       { type: string }
                description:                { type: string }
                hero_image_url:             { type: string }
                price:                      { type: number }
                seat_capacity:              { type: integer }
                tags:                       { type: array, items: { type: string } }
                benefits:                   { type: array, items: { type: string } }
                open_registration_at:       { type: string, format: date-time, nullable: true }
                close_registration_at:      { type: string, format: date-time, nullable: true }
                registration_open_override: { type: boolean, nullable: true }
                is_featured:                { type: boolean }
                schedule:                   { type: array, items: { $ref: '#/components/schemas/ScheduleItem' } }
                extra_questions:            { type: array, items: { $ref: '#/components/schemas/ExtraQuestion' } }
      responses:
        '200':
          description: Updated activity
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Activity' }
        '400': { description: "VALIDATION_ERROR — no valid fields provided" }
        '403': { description: "FORBIDDEN" }
        '404': { description: "NOT_FOUND" }
    delete:
      tags: [Admin — Activities]
      summary: Soft-delete activity
      description: |
        Sets `deleted_at` timestamp — does NOT hard-delete.
        Blocked if any PAID or JOINED registrations exist (returns 409).
        All PENDING registrations are cancelled before soft-delete.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '204': { description: Soft-deleted }
        '403': { description: "FORBIDDEN" }
        '404': { description: "NOT_FOUND" }
        '409': { description: "HAS_ACTIVE_REGISTRATIONS" }

  
  # ═══════════════════════════════════════════════════════════════════════════
  # ADMIN — REGISTRATIONS
  # ═══════════════════════════════════════════════════════════════════════════
  /admin/registrations:
    get:
      tags: [Admin — Registrations]
      summary: List all registrations
      security: [{ BearerAuth: [] }]
      parameters:
        - in: query
          name: activity_id
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string, enum: [PENDING, PAID, JOINED, CANCELLED] }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
      responses:
        '200':
          description: Paginated registration list with user and activity detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  meta:    { $ref: '#/components/schemas/PaginationMeta' }
                  data:    { type: array, items: { $ref: '#/components/schemas/Registration' } }

  /admin/registrations/{id}/status:
    patch:
      tags: [Admin — Registrations]
      summary: Manually override registration status
      description: |
        Allowed transitions:

        | From | To |
        |------|----|
        | PENDING | PENDING, PAID, CANCELLED |
        | PAID | PAID, JOINED, CANCELLED |
        | JOINED | (terminal — no transitions) |
        | CANCELLED | PENDING (undo a mistake) |

        **Side-effects:**
        - `PENDING → PAID`: `$inc enrolled_count`
        - `PAID/JOINED → CANCELLED`: `$inc enrolled_count: -1` (seat freed)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:     { type: string, enum: [PENDING, PAID, JOINED, CANCELLED] }
                group_name: { type: string, nullable: true, description: "Optionally assign/update group" }
      responses:
        '200':
          description: Updated registration
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Registration' }
        '403': { description: "FORBIDDEN" }
        '404': { description: "NOT_FOUND" }
        '422': { description: "INVALID_STATUS_TRANSITION" }

  # ═══════════════════════════════════════════════════════════════════════════
  # ADMIN — PAYMENTS
  # ═══════════════════════════════════════════════════════════════════════════
  /admin/payments/{id}/status:
    patch:
      tags: [Admin — Payments]
      summary: Finance team verifies or rejects a payment
      description: |
        Allowed transitions:

        | From | To | Side-effect |
        |------|----|-------------|
        | WAITING | VERIFIED | Sets `verified_at`. Ensures registration is PAID. |
        | WAITING | FAILED | Reverts registration to PENDING, `$dec enrolled_count` |
        | VERIFIED | FAILED | Reverses verification — same revert chain |
        | FAILED | WAITING | Re-opens for re-review |

        Optionally assigns `group_name` on the linked registration at the same time as verifying.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [WAITING, VERIFIED, FAILED]
                note:
                  type: string
                  nullable: true
                  description: "Finance note — shown in export"
                group_name:
                  type: string
                  nullable: true
                  description: "Assign group on the linked registration at verification time"
      responses:
        '200':
          description: Payment status updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Payment' }
        '400': { description: "VALIDATION_ERROR — invalid status value" }
        '403': { description: "FORBIDDEN" }
        '404': { description: "NOT_FOUND" }
        '422': { description: "INVALID_STATUS_TRANSITION — already in that status" }

  # ═══════════════════════════════════════════════════════════════════════════
  # STAMP STORE — USER
  # ═══════════════════════════════════════════════════════════════════════════
  /stampstore:
    get:
      tags: [Stamp Store]
      summary: List all stores with user's stamp status
      description: |
        Returns every store and whether the authenticated user has already collected
        a stamp from it (`count: 1`) or not (`count: 0`).
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Store list with stamp status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/StoreStampStatus' }
        '401': { description: "TOKEN_MISSING or TOKEN_EXPIRED" }

  /stampstore/createstamp:
    post:
      tags: [Stamp Store]
      summary: Collect a stamp from a store
      description: |
        Attendee submits the store's secret code. The API hashes it, looks up the
        matching store, and records a new stamp. Idempotent — if the user already
        has a stamp from this store the request succeeds silently (no duplicate created).
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  description: "Plain-text code entered by the attendee (hashed server-side)"
      responses:
        '200':
          description: Stamp recorded (or already existed — idempotent)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Stamp' }
        '400': { description: "VALIDATION_ERROR — code is required" }
        '401': { description: "TOKEN_MISSING or TOKEN_EXPIRED" }
        '404': { description: "STORE_NOT_FOUND — no store matches this code" }

  # ═══════════════════════════════════════════════════════════════════════════
  # ADMIN — STAMP STORE
  # ═══════════════════════════════════════════════════════════════════════════
  /admin/stampstore/create:
    post:
      tags: [Admin — Stamp Store]
      summary: Create a new store
      description: "Creates a store record. The plain-text `code` is hashed before storage."
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, code]
              properties:
                name: { type: string, description: "Display name shown on the stamp page" }
                code: { type: string, description: "Plain-text secret code (stored as bcrypt hash)" }
      responses:
        '201':
          description: Store created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Store' }
        '400': { description: "VALIDATION_ERROR — name or code missing" }
        '403': { description: "FORBIDDEN — admin only" }

  /admin/stampstore/changecode:
    patch:
      tags: [Admin — Stamp Store]
      summary: Rotate a store's secret code
      description: "Use when a code leaks. Saves the new code as a bcrypt hash."
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [_id, new_code]
              properties:
                _id:      { type: string, description: "Store UUIDv7" }
                new_code: { type: string, description: "Replacement plain-text code" }
      responses:
        '200':
          description: Code updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Store' }
        '400': { description: "VALIDATION_ERROR" }
        '403': { description: "FORBIDDEN — admin only" }
        '404': { description: "NOT_FOUND — store not found" }

  /admin/stampstore/markexchanged:
    patch:
      tags: [Admin — Stamp Store]
      summary: Mark a user's stamps as redeemed
      description: "Called by TCOS staff when a participant exchanges stamps for a prize. Sets `is_exchanged = true`."
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id: { type: string, description: "User UUIDv7 (= StampUser._id)" }
      responses:
        '200':
          description: Marked as exchanged
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/StampUser' }
        '400': { description: "VALIDATION_ERROR — user_id missing" }
        '403': { description: "FORBIDDEN — admin only" }
        '404': { description: "NOT_FOUND — no StampUser record for this user" }
